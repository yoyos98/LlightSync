<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LightSync">
<title>LightSync — Progress</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #16162a;
    --border: #1e1e3a;
    --accent-sub: #7c3aed;
    --accent-bas: #2563eb;
    --accent-med: #059669;
    --accent-alt: #d97706;
    --neon: #a78bfa;
    --neon-glow: rgba(167,139,250,0.15);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --danger: #ef4444;
    --success: #10b981;
    --mono: 'Space Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--neon);
    text-transform: uppercase;
  }

  .phase-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .header h1 span {
    color: var(--neon);
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* EQ visualizer signature element */
  .eq-bar {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 32px;
    margin: 16px 0 0;
    padding: 0 20px;
  }

  .eq-bar div {
    flex: 1;
    border-radius: 2px 2px 0 0;
    animation: eq-pulse 1.2s ease-in-out infinite alternate;
  }

  .eq-bar div:nth-child(1) { background: var(--accent-sub); height: 40%; animation-delay: 0s; }
  .eq-bar div:nth-child(2) { background: var(--accent-sub); height: 70%; animation-delay: 0.1s; }
  .eq-bar div:nth-child(3) { background: var(--accent-bas); height: 90%; animation-delay: 0.2s; }
  .eq-bar div:nth-child(4) { background: var(--accent-bas); height: 60%; animation-delay: 0.3s; }
  .eq-bar div:nth-child(5) { background: var(--accent-med); height: 80%; animation-delay: 0.15s; }
  .eq-bar div:nth-child(6) { background: var(--accent-med); height: 50%; animation-delay: 0.25s; }
  .eq-bar div:nth-child(7) { background: var(--accent-alt); height: 65%; animation-delay: 0.35s; }
  .eq-bar div:nth-child(8) { background: var(--accent-alt); height: 35%; animation-delay: 0.4s; }
  .eq-bar div:nth-child(9) { background: var(--accent-sub); height: 75%; animation-delay: 0.05s; }
  .eq-bar div:nth-child(10) { background: var(--accent-bas); height: 45%; animation-delay: 0.2s; }
  .eq-bar div:nth-child(11) { background: var(--accent-med); height: 85%; animation-delay: 0.3s; }
  .eq-bar div:nth-child(12) { background: var(--accent-alt); height: 55%; animation-delay: 0.1s; }

  @keyframes eq-pulse {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }

  /* Overall progress */
  .overall-card {
    margin: 20px 20px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }

  .overall-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-sub), var(--neon), var(--accent-bas));
  }

  .overall-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 10px;
  }

  .overall-stats {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .overall-pct {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: 700;
    color: var(--neon);
    line-height: 1;
  }

  .overall-info {
    flex: 1;
  }

  .overall-info p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-sub), var(--neon));
    transition: width 0.6s ease;
  }

  /* Section title */
  .section-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-family: var(--mono);
    margin: 24px 20px 12px;
  }

  /* Phase cards */
  .phases {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .phase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .phase-card.active {
    border-color: var(--neon);
    box-shadow: 0 0 20px var(--neon-glow);
  }

  .phase-card.done {
    border-color: var(--success);
    opacity: 0.7;
  }

  .phase-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
  }

  .phase-num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    min-width: 28px;
  }

  .phase-info {
    flex: 1;
  }

  .phase-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .phase-period {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .phase-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }

  .phase-card.active .phase-dot {
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
    animation: pulse-dot 2s infinite;
  }

  .phase-card.done .phase-dot {
    background: var(--success);
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .phase-prog {
    height: 3px;
    background: var(--surface2);
    margin: 0 16px 14px;
    border-radius: 2px;
    overflow: hidden;
  }

  .phase-prog-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--neon);
    transition: width 0.4s ease;
  }

  .phase-card.done .phase-prog-fill {
    background: var(--success);
  }

  /* Weeks expandable */
  .weeks {
    border-top: 1px solid var(--border);
    display: none;
    padding: 12px 16px;
    gap: 8px;
    flex-direction: column;
  }

  .weeks.open {
    display: flex;
  }

  .week-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .week-item.done {
    border-color: var(--success);
    opacity: 0.6;
  }

  .week-item.current {
    border-color: var(--neon);
  }

  .week-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }

  .week-item.done .week-check {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }

  .week-item.current .week-check {
    border-color: var(--neon);
  }

  .week-content {
    flex: 1;
  }

  .week-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-bottom: 3px;
  }

  .week-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .week-must {
    font-size: 11px;
    color: var(--neon);
    font-family: var(--mono);
  }

  .week-item.done .week-must {
    color: var(--success);
  }

  /* Recap section */
  .recap-section {
    margin: 0 20px;
    padding-bottom: 30px;
  }

  .recap-input-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .recap-input-wrap:focus-within {
    border-color: var(--neon);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 14px 16px;
    resize: none;
    min-height: 90px;
  }

  textarea::placeholder {
    color: var(--text-muted);
  }

  .recap-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }

  .recap-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .send-btn {
    background: var(--neon);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .send-btn:active { opacity: 0.7; }

  /* Recaps history */
  .recap-history {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .recap-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
  }

  .recap-entry-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .recap-entry-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 20px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 0;
  }

  .nav-icon {
    font-size: 20px;
  }

  .nav-label {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 0.1em;
  }

  .nav-item.active .nav-label {
    color: var(--neon);
  }

  /* Tabs */
  .tab { display: none; }
  .tab.active { display: block; }

  .spacer { height: 80px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--mono);
  }
</style>
</head>
<body>

<div id="tab-progress" class="tab active">
  <div class="header">
    <div class="header-top">
      <span class="logo">LightSync</span>
      <span class="phase-badge" id="current-phase-badge">FASE 1</span>
    </div>
    <h1>Il tuo<br><span>progresso</span></h1>
    <p class="header-sub" id="today-date"></p>
  </div>

  <div class="eq-bar">
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
  </div>

  <div class="overall-card">
    <div class="overall-label">Progresso totale</div>
    <div class="overall-stats">
      <div class="overall-pct" id="overall-pct">0%</div>
      <div class="overall-info">
        <p id="overall-desc">0 settimane completate su 42</p>
        <div class="progress-track">
          <div class="progress-fill" id="overall-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">Fasi del progetto</div>

  <div class="phases" id="phases-container"></div>

  <div class="spacer"></div>
</div>

<div id="tab-recap" class="tab">
  <div class="header">
    <div class="header-top">
      <span class="logo">LightSync</span>
    </div>
    <h1>Recap <span>sessioni</span></h1>
    <p class="header-sub">Scrivimi cosa hai fatto, ti do feedback</p>
  </div>

  <div class="eq-bar">
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
  </div>

  <div class="section-title">Nuova sessione</div>

  <div class="recap-section">
    <div class="recap-input-wrap">
      <textarea id="recap-text" placeholder="Scrivi cosa hai fatto oggi, cosa ha funzionato, cosa no..."></textarea>
      <div class="recap-footer">
        <span class="recap-date" id="recap-date"></span>
        <button class="send-btn" onclick="saveRecap()">Salva</button>
      </div>
    </div>

    <div class="section-title" style="margin: 20px 0 12px;">Sessioni salvate</div>
    <div class="recap-history" id="recap-history"></div>
  </div>

  <div class="spacer"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('progress', this)">
    <span class="nav-icon">📊</span>
    <span class="nav-label">PROGRESS</span>
  </div>
  <div class="nav-item" onclick="switchTab('recap', this)">
    <span class="nav-icon">✏️</span>
    <span class="nav-label">RECAP</span>
  </div>
</div>

<script>
// ---- DATI PIANO ----
const PLAN = [
  {
    id: 1,
    name: "Fondamenta",
    period: "Giu → Lug 2026",
    goal: "Audio analyzer perfetto + prime luci",
    weeks: [
      { id: "1-1", label: "SETT 1-2", title: "Risolvi saturazione valori bande", must: "Valori che usano range 0-1 su 3 generi diversi" },
      { id: "1-2", label: "SETT 3-4", title: "MagicHome collegato + prima luce comandata da Python", must: "Almeno 1 colore che cambia via codice" },
      { id: "1-3", label: "SETT 5-6", title: "Prima luce che pulsa a tempo con il beat", must: "Guardandola si capisce che segue la musica" },
    ]
  },
  {
    id: 2,
    name: "Prodotto base",
    period: "Ago → Ott 2026",
    goal: "Modalità Ambient funzionante end-to-end",
    weeks: [
      { id: "2-1", label: "SETT 7-9", title: "Colori per banda + transizioni smooth", must: "30 minuti senza crash" },
      { id: "2-2", label: "SETT 10-12", title: "Transizione su MacBook M3", must: "Funziona identico su Mac e PC" },
      { id: "2-3", label: "SETT 13-15", title: "Modalità Ambient completa", must: "Un amico riesce ad avviarlo senza aiuto" },
    ]
  },
  {
    id: 3,
    name: "Prodotto completo",
    period: "Nov 2026 → Feb 2027",
    goal: "Tutte e 3 le modalità + GUI base",
    weeks: [
      { id: "3-1", label: "SETT 16-20", title: "Modalità Chill e Party", must: "Testata a una festa reale" },
      { id: "3-2", label: "SETT 21-25", title: "GUI con PyQt6 — on/off, modalità, BPM visibile", must: "Usi solo GUI, mai il terminale" },
      { id: "3-3", label: "SETT 26-28", title: "Stabilità e bug fix", must: "2 ore senza crash o problemi" },
    ]
  },
  {
    id: 4,
    name: "Rifinitura",
    period: "Mar → Giu 2027",
    goal: "App che non ti vergogni a far vedere",
    weeks: [
      { id: "4-1", label: "SETT 29-33", title: "GUI bella con brand LightSync", must: "Sembra un prodotto vero" },
      { id: "4-2", label: "SETT 34-38", title: "Supporto multi-dispositivo (MagicHome + Hue)", must: "Funziona con 2 controller diversi" },
      { id: "4-3", label: "SETT 39-42", title: "Installer per Windows e Mac + polish finale", must: "Un estraneo lo installa senza istruzioni" },
    ]
  },
  {
    id: 5,
    name: "Lancio soft",
    period: "Lug → Dic 2027",
    goal: "Prime persone reali che lo usano",
    weeks: [
      { id: "5-1", label: "LANCIO 1", title: "Primo video TikTok/IG con luci sincronizzate", must: "Almeno 1 video pubblicato" },
      { id: "5-2", label: "LANCIO 2", title: "Beta gratuita per 10-20 amici", must: "Raccogliere almeno 5 feedback scritti" },
      { id: "5-3", label: "LANCIO 3", title: "Freemium su Lemon Squeezy", must: "Pagina prodotto live e funzionante" },
    ]
  }
];

// ---- STATE ----
let state = JSON.parse(localStorage.getItem('lightsync-state') || '{}');
let recaps = JSON.parse(localStorage.getItem('lightsync-recaps') || '[]');

function saveState() {
  localStorage.setItem('lightsync-state', JSON.stringify(state));
}

function totalWeeks() {
  return PLAN.reduce((a, p) => a + p.weeks.length, 0);
}

function completedWeeks() {
  return Object.values(state).filter(v => v === 'done').length;
}

function overallPct() {
  return Math.round((completedWeeks() / totalWeeks()) * 100);
}

function currentPhaseId() {
  for (let p of PLAN) {
    const allDone = p.weeks.every(w => state[w.id] === 'done');
    if (!allDone) return p.id;
  }
  return PLAN[PLAN.length - 1].id;
}

function phaseProgress(phase) {
  const done = phase.weeks.filter(w => state[w.id] === 'done').length;
  return Math.round((done / phase.weeks.length) * 100);
}

// ---- RENDER ----
function render() {
  const now = new Date();
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('recap-date').textContent =
    now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

  const pct = overallPct();
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-desc').textContent =
    completedWeeks() + ' settimane completate su ' + totalWeeks();

  const curPhase = currentPhaseId();
  document.getElementById('current-phase-badge').textContent = 'FASE ' + curPhase;

  const container = document.getElementById('phases-container');
  container.innerHTML = '';

  PLAN.forEach(phase => {
    const allDone = phase.weeks.every(w => state[w.id] === 'done');
    const isActive = phase.id === curPhase;
    const prog = phaseProgress(phase);

    const card = document.createElement('div');
    card.className = 'phase-card' + (allDone ? ' done' : isActive ? ' active' : '');

    card.innerHTML = `
      <div class="phase-header" onclick="toggleWeeks(${phase.id})">
        <span class="phase-num">F${phase.id}</span>
        <div class="phase-info">
          <div class="phase-name">${phase.name}</div>
          <div class="phase-period">${phase.period} · ${prog}%</div>
        </div>
        <div class="phase-dot"></div>
      </div>
      <div class="phase-prog">
        <div class="phase-prog-fill" style="width:${prog}%"></div>
      </div>
      <div class="weeks" id="weeks-${phase.id}">
        ${phase.weeks.map(w => {
          const isDone = state[w.id] === 'done';
          const isCur = !isDone && isActive;
          return `
            <div class="week-item ${isDone ? 'done' : isCur ? 'current' : ''}"
                 onclick="toggleWeek('${w.id}')">
              <div class="week-check">${isDone ? '✓' : ''}</div>
              <div class="week-content">
                <div class="week-label">${w.label}</div>
                <div class="week-title">${w.title}</div>
                <div class="week-must">Must: ${w.must}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    container.appendChild(card);
    if (isActive) {
      setTimeout(() => {
        const el = document.getElementById('weeks-' + phase.id);
        if (el) el.classList.add('open');
      }, 0);
    }
  });

  renderRecaps();
}

function toggleWeeks(phaseId) {
  const el = document.getElementById('weeks-' + phaseId);
  el.classList.toggle('open');
}

function toggleWeek(weekId) {
  state[weekId] = state[weekId] === 'done' ? undefined : 'done';
  saveState();
  render();
}

// ---- RECAP ----
function saveRecap() {
  const text = document.getElementById('recap-text').value.trim();
  if (!text) return;
  recaps.unshift({
    date: new Date().toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' }),
    text
  });
  localStorage.setItem('lightsync-recaps', JSON.stringify(recaps));
  document.getElementById('recap-text').value = '';
  renderRecaps();
}

function renderRecaps() {
  const container = document.getElementById('recap-history');
  if (!recaps.length) {
    container.innerHTML = '<div class="empty">Nessun recap ancora.<br>Scrivi la tua prima sessione!</div>';
    return;
  }
  container.innerHTML = recaps.map(r => `
    <div class="recap-entry">
      <div class="recap-entry-date">${r.date}</div>
      <div class="recap-entry-text">${r.text}</div>
    </div>
  `).join('');
}

// ---- NAV ----
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

render();
</script>
</body>
</html>
